<!doctype html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Student Grades{% endblock %}</title>
  <script>
    (function () {
      const savedTheme = localStorage.getItem('theme') || 'light';
      document.documentElement.dataset.theme = savedTheme;

      const savedLang = localStorage.getItem('dashboard_lang');
      const resolvedLang = savedLang || 'ar';
      document.documentElement.lang = resolvedLang;
      document.documentElement.dir = resolvedLang === 'ar' ? 'rtl' : 'ltr';

      if (window.location.pathname === '/dashboard') {
        document.documentElement.classList.add('dashboard-preload');
        document.documentElement.style.backgroundColor = savedTheme === 'dark' ? '#020617' : '#f0f4f9';
      }

      const isAuthPage = /^\/(?:login|signup)\/?$/.test(window.location.pathname);
      if (savedLang === 'en' && isAuthPage) {
        document.documentElement.classList.add('auth-loading');
        document.documentElement.dataset.authReady = '0';

        const releaseAuthLoading = (deadline) => {
          if (document.documentElement.dataset.authReady === '1' || Date.now() >= deadline) {
            document.documentElement.classList.remove('auth-loading');
            return;
          }

          setTimeout(() => releaseAuthLoading(deadline), 50);
        };

        setTimeout(() => releaseAuthLoading(Date.now() + 1200), 150);
      }
    })();
  </script>
  <style>
    html.auth-loading body {
      opacity: 0 !important;
      pointer-events: none !important;
    }

    html.auth-loading .auth-card {
      opacity: 0 !important;
      visibility: hidden !important;
    }

    /* ========== VIEW TRANSITIONS FOR THEME ========== */
    ::view-transition-old(root) {
      animation: none !important;
      mix-blend-mode: normal !important;
      z-index: 1 !important;
    }
    ::view-transition-new(root) {
      animation: ripple-expand 600ms cubic-bezier(0.4, 0, 0.2, 1) forwards !important;
      mix-blend-mode: normal !important;
      z-index: 9999 !important;
    }
    @keyframes ripple-expand {
      from {
        clip-path: circle(0px at var(--ripple-x) var(--ripple-y));
      }
      to {
        clip-path: circle(var(--ripple-r) at var(--ripple-x) var(--ripple-y));
      }
    }
  </style>
  <link rel="stylesheet" href="/static/css/app.css?v=101" />
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  
  <style>
    /* ========== حل مشكلة القائمة الجانبية (Sidebar) في النسخة العربية ========== */
    html[dir="rtl"] .sidebar {
      left: auto !important;
      right: 0 !important;
      transform: translateX(100%) !important;
      border-right: none !important;
      border-left: 1px solid var(--border-color, #e5e7eb) !important;
    }

    html[dir="rtl"] .sidebar.open {
      transform: translateX(0) !important;
    }
  </style>
</head>

<body>
  <div id="magicDust" class="magic-dust-layer" aria-hidden="true"></div>
  <header class="topbar">
    <div class="brand-wrap">
      <img src="{{ university.university_logo_path }}" alt="logo" class="brand-logo"
        onerror="this.style.display='none'" />
      <div class="brand-text-container">
        <div class="brand-title">{{ university.university_name }}</div>
        <div class="brand-sub">{{ university.college_name }}</div>
      </div>
    </div>

    <div class="topbar-actions">
      {% block topbar_actions %}{% endblock %}

      <button id="themeToggle" class="ghost-btn icon-btn" title="المظهر" aria-label="Theme"><svg width="20" height="20"
          viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <circle cx="12" cy="12" r="5" />
          <line x1="12" y1="1" x2="12" y2="3" />
          <line x1="12" y1="21" x2="12" y2="23" />
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
          <line x1="1" y1="12" x2="3" y2="12" />
          <line x1="21" y1="12" x2="23" y2="12" />
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
        </svg></button>
    </div>
  </header>

  <main class="page-wrap">
    {% block content %}{% endblock %}
  </main>

  <script>
    const toggleBtn = document.getElementById('themeToggle');
    let _themeAnimating = false;

    if (toggleBtn) {
      toggleBtn.addEventListener('click', () => {
        if (_themeAnimating) return;

        const isDark = document.documentElement.dataset.theme === 'dark';
        const next = isDark ? 'light' : 'dark';

        /* Calculate ripple origin — compensate for CSS zoom on html */
        const zoom = parseFloat(getComputedStyle(document.documentElement).zoom) || 1;
        const rect = toggleBtn.getBoundingClientRect();
        const cx = (rect.left + rect.width / 2) / zoom;
        const cy = (rect.top + rect.height / 2) / zoom;
        const maxRadius = Math.hypot(
          Math.max(cx, window.innerWidth / zoom - cx),
          Math.max(cy, window.innerHeight / zoom - cy)
        );

        /* Set CSS variables for the CSS animation */
        document.documentElement.style.setProperty('--ripple-x', `${cx}px`);
        document.documentElement.style.setProperty('--ripple-y', `${cy}px`);
        document.documentElement.style.setProperty('--ripple-r', `${maxRadius}px`);

        /* Spin the icon */
        const svg = toggleBtn.querySelector('svg');
        if (svg) {
          svg.style.transition = 'transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1)';
          svg.style.transform = 'rotate(360deg)';
          setTimeout(() => { svg.style.transition = ''; svg.style.transform = ''; }, 650);
        }

        /* Fallback for older browsers */
        if (!document.startViewTransition) {
          document.documentElement.dataset.theme = next;
          localStorage.setItem('theme', next);
          if (window.location.pathname === '/dashboard') {
            document.documentElement.style.backgroundColor = next === 'dark' ? '#020617' : '#f0f4f9';
          }
          return;
        }

        _themeAnimating = true;

        /* Use View Transitions API — takes REAL screenshots of old & new theme */
        const transition = document.startViewTransition(() => {
          document.documentElement.dataset.theme = next;
          localStorage.setItem('theme', next);
          if (window.location.pathname === '/dashboard') {
            document.documentElement.style.backgroundColor = next === 'dark' ? '#020617' : '#f0f4f9';
          }
        });

        transition.finished.finally(() => { _themeAnimating = false; });
      });
    }
  </script>
  <script>
    (function () {
      const dustLayer = document.getElementById('magicDust');
      const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (!dustLayer || prefersReducedMotion) {
        return;
      }

      const palette = [
        'rgba(56, 189, 248, 0.95)', // Sky Blue
        'rgba(45, 212, 191, 0.9)',  // Soft Teal
        'rgba(129, 140, 248, 0.85)', // Indigo
        'rgba(251, 191, 36, 0.75)'  // Amber Gold
      ];
      let lastSpawn = 0;

      function spawnParticle(x, y) {
        if (dustLayer.childElementCount > 64 && dustLayer.firstElementChild) {
          dustLayer.firstElementChild.remove();
        }

        const particle = document.createElement('span');
        particle.className = 'magic-dust-particle';

        const size = 4 + Math.random() * 8;
        const driftX = `${Math.round(Math.random() * 60 - 30)}px`;
        const driftY = `${Math.round(-30 - Math.random() * 80)}px`;
        const duration = `${1800 + Math.round(Math.random() * 900)}ms`;
        const color = palette[Math.floor(Math.random() * palette.length)];

        particle.style.left = `${x}px`;
        particle.style.top = `${y}px`;
        particle.style.setProperty('--size', `${size}px`);
        particle.style.setProperty('--drift-x', driftX);
        particle.style.setProperty('--drift-y', driftY);
        particle.style.setProperty('--duration', duration);
        particle.style.setProperty('--particle-color', color);

        dustLayer.appendChild(particle);
        particle.addEventListener('animationend', () => particle.remove(), { once: true });
      }

      function burst(x, y, count) {
        for (let index = 0; index < count; index += 1) {
          spawnParticle(x + (Math.random() * 6 - 3), y + (Math.random() * 6 - 3));
        }
      }

      window.addEventListener('pointermove', (event) => {
        if (event.pointerType === 'touch') {
          return;
        }

        const now = Date.now();
        if (now - lastSpawn < 42) {
          return;
        }

        lastSpawn = now;
        burst(event.clientX, event.clientY, 3);
      }, { passive: true });

      window.addEventListener('pointerdown', (event) => {
        if (event.pointerType === 'touch') {
          return;
        }

        burst(event.clientX, event.clientY, 6);
      }, { passive: true });

      window.addEventListener('scroll', () => {
        const x = Math.random() * window.innerWidth;
        const y = Math.min(window.innerHeight - 20, 120 + Math.random() * window.innerHeight * 0.65);
        burst(x, y, 1);
      }, { passive: true });
    })();
  </script>
  <div id="customModal" class="modal-overlay" style="display: none;">
    <div class="modal-card">
      <div class="modal-body">
        <h3 id="modalTitle">تأكيد الإجراء</h3>
        <p id="modalMessage">هل أنت متأكد?</p>
      </div>
      <div class="modal-footer">
        <button id="modalCancelBtn" class="ghost-btn">إلغاء</button>
        <button id="modalConfirmBtn" class="primary-btn">تأكيد</button>
      </div>
    </div>
  </div>

  {% block scripts %}{% endblock %}
</body>

</html>
